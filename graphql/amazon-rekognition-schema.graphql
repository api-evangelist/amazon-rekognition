  leftEyeBrowRight
  leftEyeBrowUp
  rightEyeBrowLeft
  rightEyeBrowRight
  rightEyeBrowUp
  leftEyeLeft
  leftEyeRight
  leftEyeUp
  leftEyeDown
  rightEyeLeft
  rightEyeRight
  rightEyeUp
  rightEyeDown
  noseLeft
  noseRight
  mouthUp
  mouthDown
  leftPupil
  rightPupil
  upperJawlineLeft
  midJawlineLeft
  chinBottom
  midJawlineRight
  upperJawlineRight
}

enum ContentModerationSortBy {
  NAME
  TIMESTAMP
}

enum FaceSearchSortBy {
  INDEX
  TIMESTAMP
}

enum LabelDetectionSortBy {
  NAME
  TIMESTAMP
}

enum PersonTrackingSortBy {
  INDEX
  TIMESTAMP
}

enum SegmentType {
