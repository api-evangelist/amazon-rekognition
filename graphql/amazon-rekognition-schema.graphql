}

"""Base64-encoded image bytes (up to 5 MB)."""
type Bytes {
  data: String
}

"""An image supplied as S3 reference or raw bytes."""
type Image {
  bytes: String
  s3Object: S3Object
}

"""Extended image metadata returned from analysis operations."""
type ImageDetail {
