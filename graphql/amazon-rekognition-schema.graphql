"""
Amazon Rekognition GraphQL Schema
Derived from the Amazon Rekognition REST API.
Reference: https://docs.aws.amazon.com/rekognition/latest/APIReference/
"""

# ─── Scalars ─────────────────────────────────────────────────────────────────

scalar AWSDateTime
scalar AWSJSON
scalar Long

# ─── Enums ───────────────────────────────────────────────────────────────────

