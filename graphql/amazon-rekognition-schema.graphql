  ROTATE_90
  ROTATE_180
  ROTATE_270
}

enum TextTypes {
  LINE
  WORD
}

enum JobStatus {
  IN_PROGRESS
  SUCCEEDED
  FAILED
  PARTIAL_SUCCESS
}

enum QualityFilter {
  NONE
  AUTO
  LOW
  MEDIUM
  HIGH
}

enum BodyPart {
