# ─── Queries ──────────────────────────────────────────────────────────────────

type Query {
  """Detect labels (objects, scenes, concepts) in an image."""
  detectLabels(image: ID!, maxLabels: Int, minConfidence: Float): [Label]

  """Detect faces and their attributes in an image."""
  detectFaces(image: ID!, attributes: [Attribute]): [FaceDetail]

  """Compare a source face to faces in a target image."""
  compareFaces(sourceImage: ID!, targetImage: ID!, similarityThreshold: Float): FaceMatchResult

  """Recognize celebrities in an image."""
  recognizeCelebrities(image: ID!): RecognizeCelebritiesResult

  """Detect text in an image."""
  detectText(image: ID!): [TextDetection]

  """Detect moderation labels in an image."""
  detectModerationLabels(image: ID!, minConfidence: Float, humanLoopConfig: ID): [ModerationLabel]

  """Search for faces in a collection by providing an image."""
  searchFacesByImage(collectionId: ID!, image: ID!, maxFaces: Int, faceMatchThreshold: Float): FaceSearchResult

  """Search for faces in a collection by face ID."""
  searchFaces(collectionId: ID!, faceId: ID!, maxFaces: Int, faceMatchThreshold: Float): [FaceMatch]

  """List all face collections."""
  listCollections(maxResults: Int, nextToken: String): [Collection]

  """Describe a specific face collection."""
  describeCollection(collectionId: ID!): CollectionDetail

  """List faces in a collection."""
  listFaces(collectionId: ID!, maxResults: Int, nextToken: String, userId: String): [Face]

  """Detect personal protective equipment on persons in an image."""
  detectProtectiveEquipment(image: ID!, summarizationAttributes: ID): [ProtectiveEquipment]

  """Detect custom labels using a trained project version."""
  detectCustomLabels(projectVersionArn: String!, image: ID!, minConfidence: Float, maxResults: Int): [Label]

  """Get the results of a label detection video job."""
  getLabelDetection(jobId: ID!, maxResults: Int, nextToken: String, sortBy: LabelDetectionSortBy): GetJobResult

  """Get the results of a face detection video job."""
  getFaceDetection(jobId: ID!, maxResults: Int, nextToken: String): GetJobResult

  """Get the results of a celebrity recognition video job."""
  getCelebrityRecognition(jobId: ID!, maxResults: Int, nextToken: String, sortBy: FaceSearchSortBy): GetJobResult

  """Get the results of a content moderation video job."""
  getContentModeration(jobId: ID!, maxResults: Int, nextToken: String, sortBy: ContentModerationSortBy): GetJobResult

  """Get the results of a person tracking video job."""
  getPersonTracking(jobId: ID!, maxResults: Int, nextToken: String, sortBy: PersonTrackingSortBy): GetJobResult

  """Get the results of a text detection video job."""
  getTextDetection(jobId: ID!, maxResults: Int, nextToken: String): GetJobResult

  """Get the results of a segment detection video job."""
  getSegmentDetection(jobId: ID!, maxResults: Int, nextToken: String): GetJobResult

  """Get a face liveness session result."""
  getFaceLivenessSessionResults(sessionId: ID!): FaceLivenessSessionResult

  """Get details about a stream processor."""
  describeStreamProcessor(name: String!): StreamProcessor

  """List all stream processors."""
  listStreamProcessors(maxResults: Int, nextToken: String): [StreamProcessor]

  """Describe a Custom Labels project."""
  describeProjects(projectArns: [String], maxResults: Int, nextToken: String, features: [String]): [Project]

  """Describe versions of a Custom Labels project."""
  describeProjectVersions(projectArn: String!, versionNames: [String], maxResults: Int, nextToken: String): [ProjectVersion]

  """Get a media analysis job."""
  getMediaAnalysisJob(jobId: ID!): MediaAnalysis

  """List media analysis jobs."""
  listMediaAnalysisJobs(maxResults: Int, nextToken: String): [MediaAnalysis]

  """Get image properties (quality, dominant colors) for an image."""
  getImageProperties(image: ID!): ImageDetail
}

# ─── Mutations ────────────────────────────────────────────────────────────────

type Mutation {
  """Create a new face collection."""
  createCollection(collectionId: ID!, tags: AWSJSON): Collection

  """Delete a face collection."""
  deleteCollection(collectionId: ID!): Boolean

  """Index one or more faces from an image into a collection."""
  indexFaces(collectionId: ID!, image: ID!, externalImageId: String, attributes: [Attribute], qualityFilter: QualityFilter, maxFaces: Int): IndexFacesResult

  """Delete faces from a collection by face ID."""
  deleteFaces(collectionId: ID!, faceIds: [ID!]!): [ID]

  """Start an asynchronous label detection job on a video."""
  startLabelDetection(video: ID!, clientRequestToken: String, minConfidence: Float, jobTag: String, notificationChannel: ID, featuresConfig: ID): StartJobResult

  """Start an asynchronous face detection job on a video."""
  startFaceDetection(video: ID!, clientRequestToken: String, notificationChannel: ID, faceAttributes: Attribute, jobTag: String): StartJobResult

  """Start an asynchronous celebrity recognition job on a video."""
  startCelebrityRecognition(video: ID!, clientRequestToken: String, notificationChannel: ID, jobTag: String): StartJobResult

  """Start an asynchronous content moderation job on a video."""
  startContentModeration(video: ID!, minConfidence: Float, clientRequestToken: String, notificationChannel: ID, jobTag: String): StartJobResult

  """Start an asynchronous person tracking job on a video."""
  startPersonTracking(video: ID!, clientRequestToken: String, notificationChannel: ID, jobTag: String): StartJobResult

  """Start an asynchronous text detection job on a video."""
  startTextDetection(video: ID!, clientRequestToken: String, notificationChannel: ID, jobTag: String, filters: ID): StartJobResult

  """Start an asynchronous segment detection job on a video."""
  startSegmentDetection(video: ID!, clientRequestToken: String, notificationChannel: ID, jobTag: String, filters: ID, segmentTypes: [SegmentType]): StartJobResult

  """Start an asynchronous face search job on a video."""
  startFaceSearch(video: ID!, collectionId: ID!, clientRequestToken: String, notificationChannel: ID, faceMatchThreshold: Float, jobTag: String): StartJobResult

  """Create a face liveness session."""
  createFaceLivenessSession(clientRequestToken: String, kmsKeyId: String, settings: ID): Token

  """Create a stream processor."""
  createStreamProcessor(input: ID!, output: ID!, name: String!, settings: ID!, roleArn: String!, tags: AWSJSON, notificationChannel: ID, kmsKeyId: String, regionsOfInterest: [ID], dataSharingPreference: ID): StreamProcessor

  """Delete a stream processor."""
  deleteStreamProcessor(name: String!): Boolean

  """Start a stream processor."""
  startStreamProcessor(name: String!, startSelector: ID, stopSelector: ID): Boolean

  """Stop a stream processor."""
  stopStreamProcessor(name: String!): Boolean

  """Update a stream processor."""
  updateStreamProcessor(name: String!, settingsForUpdate: ID, regionsOfInterestForUpdate: [ID], dataSharingPreferenceForUpdate: ID, parametersToDelete: [String]): Boolean

  """Create a Custom Labels project."""
  createProject(projectName: String!, feature: String, autoUpdate: String): Project

  """Delete a Custom Labels project."""
  deleteProject(projectArn: String!): String

  """Create a dataset within a project."""
  createDataset(datasetType: DatasetType!, projectArn: String!, datasetSource: ID): DatasetMetadata

  """Delete a dataset."""
  deleteDataset(datasetArn: String!): Boolean

  """Start training a new Custom Labels project version."""
  createProjectVersion(projectArn: String!, versionName: String!, outputConfig: ID!, trainingData: ID, testingData: ID, tags: AWSJSON, kmsKeyId: String, featureConfig: ID): ProjectVersion

  """Stop a running Custom Labels project version."""
  stopProjectVersion(projectVersionArn: String!): String

  """Delete a Custom Labels project version."""
  deleteProjectVersion(projectVersionArn: String!): String

  """Start a media analysis job."""
  startMediaAnalysisJob(jobName: String, operationsConfig: ID!, input: ID!, outputConfig: ID!, clientRequestToken: String, kmsKeyId: String): MediaAnalysis

  """Associate faces with a user in a collection."""
  associateFaces(collectionId: ID!, userId: String!, faceIds: [ID!]!, userMatchThreshold: Float, clientRequestToken: String): AssociateFacesResult

  """Disassociate faces from a user in a collection."""
  disassociateFaces(collectionId: ID!, userId: String!, faceIds: [ID!]!, clientRequestToken: String): DisassociateFacesResult

  """Create a user in a collection."""
  createUser(collectionId: ID!, userId: String!, clientRequestToken: String): Boolean

  """Delete a user from a collection."""
  deleteUser(collectionId: ID!, userId: String!, clientRequestToken: String): Boolean

  """Tag a Rekognition resource."""
  tagResource(resourceArn: String!, tags: AWSJSON!): Boolean

  """Remove tags from a Rekognition resource."""
  untagResource(resourceArn: String!, tagKeys: [String!]!): Boolean
}

# ─── Additional Result Types ──────────────────────────────────────────────────

"""A face liveness session result."""
type FaceLivenessSessionResult {
  sessionId: ID
  status: String
  confidence: Float
  referenceImage: LivenessOutputImage
  auditImages: [LivenessOutputImage]
}

"""An image captured during a face liveness session."""
type LivenessOutputImage {
  s3Object: S3Object
  boundingBox: BoundingBox
}

"""Result of associating faces with a user."""
type AssociateFacesResult {
  associatedFaces: [AssociatedFace]
  unsuccessfulFaceAssociations: [UnsuccessfulFaceAssociation]
  userStatus: String
}

"""A successfully associated face."""
type AssociatedFace {
  faceId: ID
}

"""A face that could not be associated."""
type UnsuccessfulFaceAssociation {
  faceId: ID
  userId: String
  confidence: Float
  reasons: [String]
}

"""Result of disassociating faces from a user."""
type DisassociateFacesResult {
  disassociatedFaces: [DisassociatedFace]
  unsuccessfulFaceDisassociations: [UnsuccessfulFaceDisassociation]
  userStatus: String
}

"""A successfully disassociated face."""
type DisassociatedFace {
  faceId: ID
}

"""A face that could not be disassociated."""
type UnsuccessfulFaceDisassociation {
  faceId: ID
  userId: String
  reasons: [String]
}
