# ─── Core Geometry Types ──────────────────────────────────────────────────────

"""An axis-aligned bounding box expressed as ratios of overall image size."""
type BoundingBox {
  width: Float
  height: Float
  left: Float
  top: Float
}

"""A point within an image expressed as X,Y coordinates."""
type Point {
  x: Float
  y: Float
}

"""A polygon defined by a list of points."""
type Polygon {
  points: [Point]
}

# ─── Image Input Types ────────────────────────────────────────────────────────

"""An image stored in Amazon S3."""
type S3Object {
  bucket: String
  name: String
